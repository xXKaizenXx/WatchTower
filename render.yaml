# Render blueprint — adjust repo URL and env vars in the dashboard.
# Requires three services + Postgres + Redis for full functionality.

services:
  - type: web
    name: watchtower-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: watchtower-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: watchtower-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: watchtower-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: watchtower-redis
          type: redis
          property: connectionString
      - key: WATCHTOWER_API_KEY
        generateValue: true
      - key: TRUSTED_HOSTS
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: worker
    name: watchtower-celery
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.workers.celery_app worker -Q watchtower -l info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: watchtower-db
          property: connectionString

  - type: worker
    name: watchtower-listener
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m app.listeners.redis_expiry
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          name: watchtower-redis
          type: redis
          property: connectionString

databases:
  - name: watchtower-db
    plan: free
