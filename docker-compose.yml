services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: watchtower
      POSTGRES_PASSWORD: watchtower
      POSTGRES_DB: watchtower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchtower"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save ""
      --appendonly no
      --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://watchtower:watchtower@postgres:5432/watchtower
      DATABASE_URL_SYNC: postgresql+psycopg2://watchtower:watchtower@postgres:5432/watchtower
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WATCHTOWER_API_KEY: ${WATCHTOWER_API_KEY:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info -Q watchtower
    environment:
      ENVIRONMENT: production
      DATABASE_URL_SYNC: postgresql+psycopg2://watchtower:watchtower@postgres:5432/watchtower
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      WATCHTOWER_API_KEY: ${WATCHTOWER_API_KEY:-change-me-in-production}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TWILIO_ALERT_NUMBER: ${TWILIO_ALERT_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  listener:
    build: .
    command: python -m app.listeners.redis_expiry
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      DATABASE_URL_SYNC: postgresql+psycopg2://watchtower:watchtower@postgres:5432/watchtower
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started

volumes:
  postgres_data:
