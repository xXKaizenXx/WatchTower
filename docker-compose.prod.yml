# Production overlay — use with a strong .env (see .env.production.example)
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  postgres:
    ports: []
    restart: unless-stopped

  redis:
    ports: []
    restart: unless-stopped

  api:
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  celery-worker:
    restart: unless-stopped
    environment:
      ENVIRONMENT: production

  listener:
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
